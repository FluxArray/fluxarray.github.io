<!doctype html>
<html lang="en" data-skin="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>doswhonos</title>
  <meta name="description" content="my website" />
  <link rel="icon" type="image/png" href="/public/favicon.png">
</head>

<body class="is-home-page">
  <div class="app">
    <header class="topbar">
      <button id="brand-link" class="topbar-brand">doswhonos <span class="brand-dim">~</span></button>
      <nav id="topnav" class="topnav" aria-label="Sections"></nav>
      <nav id="breadcrumb" class="breadcrumb" aria-label="Breadcrumb"></nav>
      <button id="skin-toggle" class="skin-toggle" type="button">☀ sunny</button>
    </header>

    <div class="layout">
      <main id="content-pane" class="content-pane">
        <div id="content-header"></div>
        <div id="content-body" class="content-body"></div>
      </main>

      <aside id="terminal-sheet" class="terminal-sheet" aria-label="Terminal">
        <div class="terminal-frame" style="padding: 0.5rem 0.5rem 0rem 0.5rem;">
          <div id="terminal-container" style="height: 100%; width: 100%; overflow: hidden;"></div>
        </div>
      </aside>
    </div>
  </div>

  <button id="terminal-fab" class="terminal-fab" type="button" aria-label="Open terminal"
    aria-expanded="false">&gt;_</button>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
